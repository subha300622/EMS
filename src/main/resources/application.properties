spring.application.name=ems-backend

server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:emsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=true
spring.flyway.repair-on-migrate=false

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Logging
ems.logging.post-api-path=${POST_API_LOG_FILE:post_api_payloads.log}

# Email
resend.api-key=${RESEND_API_KEY:re_dummy_key}
resend.from-email=${RESEND_FROM_EMAIL:EMS System <noreply@company.com>}

# App Seeding Configuration
app.seed.domain=company.com
app.email.sender-address=noreply@company.com

# Frontend URL
app.base-url=${APP_BASE_URL:http://localhost:3000}

# Error handling
server.error.include-stacktrace=never
server.error.include-message=always

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.filter=true

# Spring Caching Configuration
# ReminderCacheService manages Redis directly (manual pattern, not @Cacheable).
# Other services (e.g. RoleService) still use the Spring CacheManager for
# in-memory caches. 'simple' provides a ConcurrentMapCacheManager with no
# external dependency.
spring.cache.type=simple

# Razorpay Configuration
razorpay.enabled=true
razorpay.mode=LIVE
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_live_StUZupmMw4H4yc}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:uq9yq68G6Dydj3FJXgobDeB0}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:webhook_secret}
razorpay.currency=INR

# Actuator & Prometheus Metrics
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.probes.enabled=true