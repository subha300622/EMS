spring.application.name=ems-backend

server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:emsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis
spring.data.redis.url=${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Email
resend.api-key=${RESEND_API_KEY:re_dummy_key}
resend.from-email=${RESEND_FROM_EMAIL:EMS System <noreply@company.com>}

# App Seeding Configuration
app.seed.domain=company.com
app.email.sender-address=noreply@company.com

# Frontend URL
app.base-url=${APP_BASE_URL:http://localhost:3000}

# Error handling
server.error.include-stacktrace=never
server.error.include-message=always

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.filter=true