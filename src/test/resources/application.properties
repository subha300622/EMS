spring.application.name=ems-backend-test

# Test local database defaults
spring.datasource.url=jdbc:postgresql://localhost:5432/employee_db
spring.datasource.username=ems_user
spring.datasource.password=12345
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=true
spring.flyway.repair-on-migrate=true

# Test local Redis defaults
spring.data.redis.url=${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Test local Email defaults
resend.api-key=re_Z856fqce_G3oC29ZQke3kzhdzdgWFB73d
resend.from-email=EMS System <noreply@company.com>

# App Seeding Configuration
app.seed.domain=company.com
app.email.sender-address=noreply@company.com

# Test local Frontend URL
app.base-url=http://localhost:3000

# Error handling
server.error.include-stacktrace=never
server.error.include-message=always

# Swagger
springdoc.swagger-ui.disable-swagger-default-url=true
