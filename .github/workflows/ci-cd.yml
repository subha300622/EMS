name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
      - ems-backend

  pull_request:
    branches:
      - main
      - master
      - ems-backend

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Grant Maven Wrapper Permission
        run: chmod +x mvnw

      - name: Build & Run Tests
        run: ./mvnw clean verify --batch-mode

      # Optional: Upload test reports if build fails
      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**

  deploy:
    name: Deploy to Render
    needs: build-and-test

    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/ems-backend')

    steps:
      - name: Trigger Render Deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Render Deploy Hook secret is missing."
            exit 1
          fi

          echo "Triggering Render deployment..."

          curl --fail --silent --show-error \
               --request POST \
               "$RENDER_DEPLOY_HOOK_URL"

          echo "Render deployment triggered successfully."